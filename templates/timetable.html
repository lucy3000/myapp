{% extends "base.html" %}
{% block content %}
<div class="page">
  <div class="page-title">Wochenplan</div>
  <div class="page-sub">Aktuelle Woche</div>

  <div id="week-rows"></div>
</div>

<script>
const EV_COLORS={uni:'#3b82f6',box:'#ef4444',gym:'#4ade80',run:'#22d3ee',bears:'#a78bfa',work:'#f59e0b',rest:'#444',es:'#f97316',ru:'#60a5fa'};
const WEEK=[
  {d:'Mo',full:'Montag',    ev:[['🏃 Easy Run 40min','run'],['Uni KL1+Mechanik','uni'],['🥊 Boxen 18:00','box'],['🇪🇸 Spanisch 30min','es']]},
  {d:'Di',full:'Dienstag',  ev:[['Uni Mechanik+KL1 Tut','uni'],['Bears 16–21','bears'],['🇷🇺 Russisch 30min','ru']]},
  {d:'Mi',full:'Mittwoch',  ev:[['🏋️ GYM A (leicht)','gym'],['Uni DGL VL','uni'],['🥊 Boxen 18:00','box'],['🇪🇸 Spanisch 30min','es']]},
  {d:'Do',full:'Donnerstag',ev:[['🏃 Intervalle 30min','run'],['Uni Mechanik VL','uni'],['Bears 16–22','bears'],['🇷🇺 Russisch 30min','ru']]},
  {d:'Fr',full:'Freitag',   ev:[['🏋️ GYM B (schwer)','gym'],['🇪🇸 Spanisch 30min','es']]},
  {d:'Sa',full:'Samstag',   ev:[['Bäcker 7–11','work'],['🏃 Long Run 50min','run']]},
  {d:'So',full:'Sonntag',   ev:[['Ruhetag 💤','rest'],['🇷🇺 Russisch 30min','ru']]},
];
const DAYS_DE=['So','Mo','Di','Mi','Do','Fr','Sa'];
const todayD=DAYS_DE[new Date().getDay()];
const wrap=document.getElementById('week-rows');
WEEK.forEach(d=>{
  const isToday=d.d===todayD;
  let chips=d.ev.map(([label,type])=>`<div class="event-chip" style="color:${EV_COLORS[type]||'var(--muted2)'};">${label}</div>`).join('');
  wrap.innerHTML+=`<div class="week-row${isToday?' today':''}">
    <div class="day-label"><div class="day-short">${d.d}</div><div class="day-full">${d.full}</div></div>
    <div class="events-wrap">${chips}</div>
  </div>`;
});
</script>
{% endblock %}
