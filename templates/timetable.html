{% extends "base.html" %}
{% block content %}
<div class="page">
  <div class="page-title">Wochenplan</div>
  <div class="page-sub" id="week-label">SoSe 2026</div>

  <!-- View toggle -->
  <div style="display:flex;gap:6px;margin-bottom:16px;">
    <button class="filter-btn active" onclick="setView('week',this)" id="btn-week">Woche</button>
    <button class="filter-btn" onclick="setView('day',this)" id="btn-day">Heute</button>
    <button class="filter-btn" onclick="setView('list',this)" id="btn-list">Liste</button>
  </div>

  <div id="view-week"></div>
  <div id="view-day" style="display:none;"></div>
  <div id="view-list" style="display:none;"></div>
</div>

<style>
.tt-grid {
  display: grid;
  grid-template-columns: 38px repeat(7,1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
  font-size: 11px;
  margin-bottom: 16px;
}
.tt-grid-header {
  background: var(--bg3);
  padding: 6px 4px;
  text-align: center;
  font-weight: 700;
  font-size: 11px;
  position: sticky;
  top: 0;
  z-index: 2;
}
.tt-grid-header.today-col { color: var(--neon); }
.tt-hour-label {
  background: var(--bg2);
  padding: 4px 3px;
  text-align: right;
  font-size: 9px;
  color: var(--muted);
  font-family: var(--mono);
  align-self: start;
}
.tt-cell {
  background: var(--card);
  min-height: 32px;
  position: relative;
  transition: background 0.1s;
}
.tt-cell.today-col { background: rgba(0,255,157,0.025); }
.tt-cell.past { opacity: 0.5; }
.tt-block {
  position: absolute;
  left: 1px; right: 1px;
  border-radius: 1px;
  padding: 2px 4px;
  font-size: 9px;
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  cursor: default;
  line-height: 1.3;
  border-left: 2px solid currentColor;
  box-sizing: border-box;
}
.tt-block:hover { z-index: 10; white-space: normal; }

/* Week list view */
.week-row {
  display: flex;
  align-items: stretch;
  border-bottom: 1px solid var(--border);
  min-height: 52px;
  padding: 10px 0;
  gap: 14px;
}
.week-row.today { background: rgba(0,255,157,0.025); }
.day-label { flex-shrink:0; width:80px; }
.day-short { font-family:var(--display); font-size:18px; font-weight:900; line-height:1; color:var(--muted2); }
.day-full  { font-size:10px; color:var(--muted); margin-top:2px; }
.week-row.today .day-short { color:var(--neon); }
.events-wrap { display:flex; flex-wrap:wrap; gap:5px; align-content:flex-start; flex:1; }
.event-chip {
  padding:4px 10px;
  border:1px solid currentColor;
  font-size:11px;
  font-weight:600;
  background: color-mix(in srgb, currentColor 8%, transparent);
  border-radius: 2px;
  line-height: 1.3;
}
</style>

<script>
const DAYS_DE   = ["So","Mo","Di","Mi","Do","Fr","Sa"];
const DAYS_FULL = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];

/* Events: { day, label, start, end, type }
   start/end in decimal hours (e.g. 8.5 = 08:30) */
const EVENTS = [
  // Montag
  {day:'Mo',label:'🏃 Easy Run',    start:6.5, end:7.5,  type:'run',  col:'#22d3ee'},
  {day:'Mo',label:'Uni: KL1',       start:8,   end:12,   type:'uni',  col:'#a78bfa'},
  {day:'Mo',label:'🥊 Boxen',        start:18,  end:19.5, type:'box',  col:'#ef4444'},
  {day:'Mo',label:'🇪🇸 Spanisch',    start:20,  end:20.5, type:'es',   col:'#f97316'},
  // Dienstag
  {day:'Di',label:'Uni: Mechanik',  start:8,   end:12,   type:'uni',  col:'#a78bfa'},
  {day:'Di',label:'🚀 BEARS',        start:16,  end:21,   type:'bears',col:'#f97316'},
  {day:'Di',label:'🇷🇺 Russisch',    start:21.5,end:22,   type:'ru',   col:'#60a5fa'},
  // Mittwoch
  {day:'Mi',label:'🏋️ GYM A',        start:7,   end:8.5,  type:'gym',  col:'#4ade80'},
  {day:'Mi',label:'Uni: DGL',       start:9,   end:13,   type:'uni',  col:'#a78bfa'},
  {day:'Mi',label:'🥊 Boxen',        start:18,  end:19.5, type:'box',  col:'#ef4444'},
  {day:'Mi',label:'🇪🇸 Spanisch',    start:20,  end:20.5, type:'es',   col:'#f97316'},
  // Donnerstag
  {day:'Do',label:'🏃 Intervalle',   start:6.5, end:7,    type:'run',  col:'#22d3ee'},
  {day:'Do',label:'Uni: Mechanik',  start:8,   end:12,   type:'uni',  col:'#a78bfa'},
  {day:'Do',label:'🚀 BEARS',        start:16,  end:22,   type:'bears',col:'#f97316'},
  {day:'Do',label:'🇷🇺 Russisch',    start:22.5,end:23,   type:'ru',   col:'#60a5fa'},
  // Freitag
  {day:'Fr',label:'🏋️ GYM B',        start:7,   end:9,    type:'gym',  col:'#4ade80'},
  {day:'Fr',label:'Lernen',         start:10,  end:13,   type:'uni',  col:'#a78bfa'},
  {day:'Fr',label:'🇪🇸 Spanisch',    start:20,  end:20.5, type:'es',   col:'#f97316'},
  // Samstag
  {day:'Sa',label:'🥐 Bäcker',       start:7,   end:11,   type:'work', col:'#f59e0b'},
  {day:'Sa',label:'🏃 Long Run',     start:12,  end:13,   type:'run',  col:'#22d3ee'},
  // Sonntag
  {day:'So',label:'💤 Ruhetag',      start:10,  end:22,   type:'rest', col:'#334'},
  {day:'So',label:'🇷🇺 Russisch',    start:17,  end:17.5, type:'ru',   col:'#60a5fa'},
];

const DAY_ORDER = ['Mo','Di','Mi','Do','Fr','Sa','So'];
const HOUR_START = 6, HOUR_END = 23;
const CELL_H = 32; // px per hour

const now = new Date();
const todayKey = DAYS_DE[now.getDay()];
const nowH = now.getHours() + now.getMinutes()/60;

document.getElementById('week-label').textContent =
  'KW ' + getWeekNumber(now) + ' · SoSe 2026';

function getWeekNumber(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay()||7));
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.ceil((((date - yearStart) / 86400000) + 1)/7);
}

let currentView = 'week';

function setView(v, btn) {
  currentView = v;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  ['week','day','list'].forEach(id => {
    document.getElementById('view-'+id).style.display = id===v ? '' : 'none';
  });
  if(v==='week') renderWeekGrid();
  if(v==='day')  renderDayView();
  if(v==='list') renderListView();
}

/* ── Week grid (simplified, no absolute positioning — rows per hour) ── */
function renderWeekGrid() {
  const container = document.getElementById('view-week');
  const HOURS = Array.from({length: HOUR_END-HOUR_START}, (_,i)=>HOUR_START+i);

  let html = '<div class="tt-grid">';
  // header row
  html += '<div class="tt-grid-header" style="background:var(--bg2);"></div>';
  DAY_ORDER.forEach(d => {
    const isToday = d === todayKey;
    html += `<div class="tt-grid-header${isToday?' today-col':''}">${d}${isToday?'<div style="font-size:8px;color:var(--neon);font-weight:400;">heute</div>':''}</div>`;
  });

  // Hour rows
  HOURS.forEach(h => {
    const isPast = todayKey && h < Math.floor(nowH);
    html += `<div class="tt-hour-label">${h}:00</div>`;
    DAY_ORDER.forEach(d => {
      const isToday = d === todayKey;
      // Events starting in this hour
      const evs = EVENTS.filter(e => e.day===d && Math.floor(e.start)===h);
      let cells = '';
      evs.forEach(e => {
        const durH = e.end - e.start;
        const heightPx = Math.max(22, Math.round(durH * CELL_H));
        cells += `<div style="background:${e.col}18;color:${e.col};border-left:2px solid ${e.col};padding:2px 4px;font-size:9px;font-weight:600;margin-bottom:1px;min-height:${heightPx}px;overflow:hidden;">${e.label}</div>`;
      });
      html += `<div class="tt-cell${isToday?' today-col':''}${isPast?' past':''}" style="padding:0;">${cells}</div>`;
    });
  });
  html += '</div>';

  // Legend
  const types = [...new Map(EVENTS.map(e=>[e.type,{type:e.type,col:e.col,label:e.label.replace(/^[^\w\s]*\s*/,'').split(' ')[0]}])).values()];
  html += `<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;">
    ${types.map(t=>`<span style="font-size:10px;padding:2px 8px;border:1px solid ${t.col}55;color:${t.col};border-radius:1px;">${t.label}</span>`).join('')}
  </div>`;

  container.innerHTML = html;
}

/* ── Day view ────────────────────────────────────────────────────── */
function renderDayView() {
  const container = document.getElementById('view-day');
  const todayEvs = EVENTS.filter(e=>e.day===todayKey).sort((a,b)=>a.start-b.start);

  let html = `<div style="font-family:var(--display);font-size:18px;font-weight:900;color:var(--neon);margin-bottom:14px;">
    ${DAYS_FULL[now.getDay()]} — Heute
  </div>`;

  if(!todayEvs.length) {
    html += '<div style="font-size:13px;color:var(--muted);padding:20px 0;">Keine Events heute.</div>';
  } else {
    todayEvs.forEach(e => {
      const startH = Math.floor(e.start);
      const startM = String(Math.round((e.start%1)*60)).padStart(2,'0');
      const endH   = Math.floor(e.end);
      const endM   = String(Math.round((e.end%1)*60)).padStart(2,'0');
      const isPast = e.end < nowH;
      const isNow  = e.start <= nowH && e.end > nowH;
      html += `<div style="display:flex;gap:12px;padding:10px 14px;border-left:3px solid ${isNow?e.col:isPast?'var(--border2)':e.col+'88'};background:${isNow?e.col+'0f':'var(--card)'};margin-bottom:6px;opacity:${isPast?0.5:1};transition:all 0.12s;">
        <div style="flex-shrink:0;font-family:var(--mono);font-size:11px;color:var(--muted2);padding-top:1px;">
          ${startH}:${startM}<br><span style="color:var(--muted);">${endH}:${endM}</span>
        </div>
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:600;color:${e.col};">${e.label}</div>
          <div style="font-size:11px;color:var(--muted2);margin-top:2px;">${(e.end-e.start).toFixed(1).replace('.0','')} Std${isNow?' · <span style="color:var(--neon);">jetzt</span>':''}</div>
        </div>
        ${isPast?`<div style="font-size:11px;color:var(--muted);">✓</div>`:''}
      </div>`;
    });
  }
  container.innerHTML = html;
}

/* ── List view ────────────────────────────────────────────────────── */
function renderListView() {
  const container = document.getElementById('view-list');
  let html = '';
  DAY_ORDER.forEach(d => {
    const isToday = d === todayKey;
    const dayEvs  = EVENTS.filter(e=>e.day===d).sort((a,b)=>a.start-b.start);
    const dayIdx  = DAYS_DE.indexOf(d);
    const fullName = DAYS_FULL[dayIdx];
    html += `<div style="margin-bottom:14px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
        <div style="font-family:var(--display);font-size:14px;font-weight:700;color:${isToday?'var(--neon)':'var(--text)'};">${d}</div>
        <div style="font-size:11px;color:var(--muted2);">${fullName}</div>
        ${isToday?'<span style="font-size:9px;padding:1px 7px;border:1px solid var(--neon);color:var(--neon);">HEUTE</span>':''}
      </div>`;
    if(!dayEvs.length) {
      html += `<div style="font-size:12px;color:var(--muted);padding:4px 0;">—</div>`;
    } else {
      html += `<div class="card" style="padding:0;overflow:hidden;">`;
      dayEvs.forEach(e => {
        const startH = Math.floor(e.start), startM = String(Math.round((e.start%1)*60)).padStart(2,'0');
        const endH   = Math.floor(e.end),   endM   = String(Math.round((e.end%1)*60)).padStart(2,'0');
        html += `<div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);">
          <div style="width:4px;height:4px;border-radius:50%;background:${e.col};flex-shrink:0;"></div>
          <div style="font-size:12px;font-weight:600;color:${e.col};flex-shrink:0;width:38px;font-family:var(--mono);">${startH}:${startM}</div>
          <div style="flex:1;font-size:13px;color:var(--text);">${e.label}</div>
          <div style="font-size:10px;color:var(--muted2);">${startH}:${startM}–${endH}:${endM}</div>
        </div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });
  container.innerHTML = html;
}

// Init
renderWeekGrid();
</script>
{% endblock %}
